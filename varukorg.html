<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Varukorg - Fadisblommor</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
</head>
<body>

<header>
  <div class="header-container">
    <!-- Meny-ikonen vänster -->
    <div class="menu-toggle" id="menu-toggle">&#9776;</div>
    <!-- Hemsidans namn -->
    <h1>Fadisblommor</h1>
    <!-- Varukorg-ikon höger -->
    <a href="varukorg.html" class="cart-icon">&#128722;</a>
  </div>

  <nav id="nav-menu" class="nav-menu">
    <a href="buketter.html">Buketter</a>
    <a href="begravning.html">Begravning & kondoleans</a>
    <a href="produkter.html">Alla produkter</a>
    <a href="kontakta.html">Kontakta oss</a>
    <a href="integritet.html">Integritetspolicy</a>
    <a href="kopevillkor.html">Köpevillkor</a>
    <a href="cookies.html">Cookies</a>
    <a href="varukorg.html">Varukorg</a>
  </nav>

  <div class="info-bar">
    <p>Gratis leverans i Södertälje | Betala tryggt med Klarna</p>
  </div>
</header>

<main>
  <section class="cart">
    <h2>Din varukorg</h2>
    <div id="cart-items" class="product-grid">
      <!-- Produkter från localStorage hamnar här -->
    </div>
    <div class="cart-total">
      <p>Totalt: <span id="total-price">0</span> kr</p>
      <button id="clear-cart">Rensa varukorg</button>
    </div>
  </section>
</main>

<footer>
  <p>© 2026 Fadisblommor</p>
</footer>

<script>
// Visa/göm meny
const menuToggle = document.getElementById('menu-toggle');
const navMenu = document.getElementById('nav-menu');
menuToggle.addEventListener('click', () => {
  navMenu.style.display = navMenu.style.display === 'flex' ? 'none' : 'flex';
});

// Hämta varukorgen från localStorage
function displayCart() {
  const cart = JSON.parse(localStorage.getItem('cart')) || [];
  const cartContainer = document.getElementById('cart-items');
  cartContainer.innerHTML = '';

  let total = 0;

  cart.forEach((item, index) => {
    total += item.price;

    const card = document.createElement('div');
    card.className = 'product-card';

    card.innerHTML = `
      <img src="bilder/${item.productImage || 'bukett1.jpeg'}" alt="${item.product}">
      <div class="overlay-text">
        <h3>${item.product}</h3>
        <p>${item.price}</p>
      </div>
    `;
    cartContainer.appendChild(card);
  });

  document.getElementById('total-price').innerText = total;
}

// Rensa varukorg
document.getElementById('clear-cart').addEventListener('click', () => {
  localStorage.removeItem('cart');
  displayCart();
});

// Kör vid start
displayCart();
</script>

</body>
</html>
